name: PlayerWarn
main: aiptu\playerwarn\PlayerWarn
version: 1.2.0
api: [5.39.0]
author: AIPTU
permissions:
  playerwarn.command.warn:
    description: Permission to use the /warn command
    default: op
  playerwarn.command.warns:
    description: Permission to use the /warns command
    default: true
  playerwarn.command.clearwarns:
    description: Permission to use the /clearwarns command
    default: op
  playerwarn.command.delwarn:
    description: Permission to use the /delwarn command
    default: op
  playerwarn.command.editwarn:
    description: Permission to use the /editwarn command
    default: op
  playerwarn.command.listwarns:
    description: Permission to use the /listwarns command
    default: op
  playerwarn.command.unwarn:
    description: Permission to use the /unwarn command (undo most recent warning)
    default: op
  playerwarn.bypass:
    description: Permission to bypass being warned
    default: op
  playerwarn.broadcast.bypass:
    description: Suppress receiving warning broadcast messages
    default: false
  playerwarn.join.suppress:
    description: Suppress the warning summary message on join
    default: false
  playerwarn.staff.notify:
    description: Receive a staff alert when a player is one warning away from the limit
    default: op